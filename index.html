<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BugTracker - Track & Resolve</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-bug"></i>
                <h1>BugTracker</h1>
            </div>
            <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <main>
            <section class="add-bug-section glass-panel">
                <h2><i class="fa-solid fa-plus-circle"></i> Report a New Bug</h2>
                <form id="bug-form">
                    <div class="form-group">
                        <label for="title">Bug Title</label>
                        <input type="text" id="title" placeholder="e.g. Navigation bar glitch on mobile" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority" required>
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="assignee">Assignee (Optional)</label>
                            <input type="text" id="assignee" placeholder="e.g. John Doe">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="3" placeholder="Describe the issue in detail..." required></textarea>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-paper-plane"></i> Add Bug
                    </button>
                </form>
            </section>

            <section class="board-section">
                <div class="board-column" data-status="Open">
                    <div class="column-header status-open">
                        <h3>Open</h3>
                        <span class="count" id="count-open">0</span>
                    </div>
                    <div class="bug-list" id="list-open">
                        <!-- Bugs will be injected here -->
                    </div>
                </div>

                <div class="board-column" data-status="In Progress">
                    <div class="column-header status-progress">
                        <h3>In Progress</h3>
                        <span class="count" id="count-progress">0</span>
                    </div>
                    <div class="bug-list" id="list-progress">
                        <!-- Bugs will be injected here -->
                    </div>
                </div>

                <div class="board-column" data-status="Closed">
                    <div class="column-header status-closed">
                        <h3>Closed</h3>
                        <span class="count" id="count-closed">0</span>
                    </div>
                    <div class="bug-list" id="list-closed">
                        <!-- Bugs will be injected here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toast-message">Action Successful</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
